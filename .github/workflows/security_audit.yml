name: Dependency Security Audit

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1' # Berjalan otomatis setiap hari Senin pukul 00:00

jobs:
  security_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Safety
        run: pip install safety
      - name: Check for known vulnerabilities
        run: safety check # Memeriksa requirements.txt terhadap database kerentanan keamanan
