name: "Stale Issue Investigator"

on:
  schedule:
    - cron: "30 1 * * *" # Berjalan setiap malam jam 01:30

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/stale@v8
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        stale-issue-message: 'Issue ini sudah tidak aktif selama 30 hari. Akan ditutup otomatis jika tidak ada perkembangan untuk menjaga fokus investigasi.'
        stale-pr-message: 'Pull Request ini terdeteksi stagnan. Mohon segera update kodenya agar sinkron dengan BPS Sentinel Utama.'
        days-before-stale: 30
        days-before-close: 7
