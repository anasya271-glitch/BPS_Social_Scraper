name: 'Dependency Gatekeeper'

on: [pull_request]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v3
      - name: 'Dependency Review Analysis'
        uses: actions/dependency-review-action@v3
        with:
          # Memblokir PR jika ada library dengan tingkat bahaya "critical" atau "high"
          severity-threshold: high
          # Menolak library dengan lisensi yang bertentangan dengan MIT/GPL
          allow-licenses: MIT, Apache-2.0, BSD-3-Clause, PSF-2.0
